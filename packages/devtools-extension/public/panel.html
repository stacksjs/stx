<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body { font: 12px/1.5 ui-monospace, monospace; margin: 0; color: #ddd; background: #1e1e1e; }
    #bar { display: flex; gap: 4px; padding: 6px; border-bottom: 1px solid #333; flex-wrap: wrap; }
    button { background: #2d2d2d; color: #ddd; border: 1px solid #444; border-radius: 4px; padding: 3px 8px; cursor: pointer; }
    button:hover { background: #3a3a3a; }
    #out { padding: 8px; white-space: pre-wrap; overflow: auto; }
  </style>
</head>
<body>
  <div id="bar"><button id="enable">enable tracking</button></div>
  <pre id="out">Pick a view above.</pre>
  <script src="panel.js"></script>
</body>
</html>
