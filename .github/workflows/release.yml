name: Releaser

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  npm:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install Dependencies
        run: bun install

      - name: Pre-build icon collections (parallel)
        # Building dist/ for ~218 icon collections serially during the
        # publish step is the dominant cost (~30 min of an ~80 min run).
        # Run the builds concurrently here using xargs -P; each build.ts
        # short-circuits on subsequent calls because dist/ is already
        # fresh, so prepublishOnly during pantry's publish becomes a
        # ~50ms no-op per package.
        run: |
          set -e
          ls -d packages/collections/iconify-*/ 2>/dev/null \
            | xargs -P 8 -I {} bash -c 'cd "{}" && bun build.ts' \
            || echo "::warning::Some icon pre-builds failed; pantry will retry via prepublishOnly"

      - name: Publish
        uses: home-lang/pantry/packages/action@main
        with:
          install: false
          publish: npm
          release: true
          release-changelog: CHANGELOG.md
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
