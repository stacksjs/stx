name: Releaser

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  npm:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install Dependencies
        run: bun install

      - name: Pre-build icon collections (parallel)
        # Each Bun build is fast (~0.3-1.6s, even for the 7640-icon mdi
        # package), so 218 serial builds during pantry's publish step is
        # only ~2 min — not the dominant release cost. Doing them in
        # parallel here cuts that to ~30s; the bigger win is that
        # prepublishOnly becomes a ~50ms no-op for each package because
        # build.ts short-circuits on a fresh dist/, simplifying the
        # publish-step output.
        run: |
          set -e
          ls -d packages/collections/iconify-*/ 2>/dev/null \
            | xargs -P 8 -I {} bash -c 'cd "{}" && bun build.ts' \
            || echo "::warning::Some icon pre-builds failed; pantry will retry via prepublishOnly"

      - name: Publish
        uses: home-lang/pantry/packages/action@main
        with:
          install: false
          publish: npm
          release: true
          release-changelog: CHANGELOG.md
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
